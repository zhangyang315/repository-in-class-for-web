<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS继承性</title>
    <style>
        body{
            color: rgb(25, 190 , 0);
            font-family: "微软雅黑",sans-serif;
        }
        .special{
            font-size: 20px;
            color: red;
        }
    </style>
</head>
<body>
    <p>离离原上草 一岁一枯荣</p>
    <p class="special">野火烧不尽 春风吹又生</p>
   
    
</body>
</html>
