<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>焦点图</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            border: 0;
            list-style: none;

        }
        a{
            text-decoration: none;
            font-size: 30px;
            color: #fff;
        }
        div{
            width: 580px;
            height: 200px;
            margin: 50px auto;
            position: relative;
        }
        a{
            float: left;
            width: 25px;
            height: 90px;
            line-height: 90px;
            background-color: #333;
            opacity: 0.7;
            border-radius: 4px;
            text-align: center;
            display: none;
            cursor: pointer;
        }
        .prev{
            position: absolute;
            left: -12px;
            top: 60px;
        }
        .next{
            position: absolute;
            right:-12px;
            top: 60px;
        }
        div:hover a{
            display: block;
        }
        ul{
            width: 110px;
            height: 20px;
            background-color: #333;
            opacity: 0.5;
            border-radius: 8px;
            position: absolute;
            right: 30px;
            bottom: 20px;
            text-align: center;
        }
        li{
            width: 5px;
            height: 5px;
            background-color: #ccc;
            display: inline-block;
            border-radius: 50%;

        }
        .max{
            background-color: #03bde4;
            width: 12px;
            border-radius: 6px;
        }

        </style>
</head>
<body>
    <div>
        <img src="../../img/img1.jpg" width="580px" height="200px" alt="科技兴国">
        <a href="#" class="prev"><</a>
        <a href="#" class="next">></a>

        <ul>
            <li class="max"></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
        </ul>
    </div>
    
</body>
</html>
