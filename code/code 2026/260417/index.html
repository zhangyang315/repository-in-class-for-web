<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>感动中国人物榜</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            list-style: none;
            outline: none;
        }
        .rbox{
            /* background-color: rgb(148, 1, 1); */
            background-image: repeating-radial-gradient(circle at 50% 50%,#c9120a,#9e110b 1%);
            width: 600px;
            height: 550px;
            border-radius: 50%;
            margin: 50px auto;
            padding: 40px;
            padding-top: 50px;
            border: 10px solid #ccc;
            /* 整体居中 */
            
        }
        ul
        {
            width: 372px;
            height: 530px;
            background-color: #f90e0e;
            border-radius: 30px;
            box-shadow: 15px 15px 12px #000;
            margin: 0 auto;
        }
        ul li
        {
            width: 372px;
            height: 55px;
            background: #f82929 url(../../pictures/huo.png) no-repeat 70px 20px;
            line-height: 55px;
            margin-bottom: 2px; 
            text-align: center;
            font-size: 20px;
            color: #d6d6d6;
            font-family: '微软雅黑';
            
        }
        ul .tp{
            width: 372px;
            height: 247px;
            background: #fc0909;
            background-image: url(../../pictures/gandong.png),url(../../pictures/wenzi.png);
            background-repeat: no-repeat;
            background-position: 87px 16px,99px 192px;
            border-radius:30px 30px 0 0;
        }
        ul .yj{border-radius:0 0 30px 30px;
        }

    
    </style>
</head>
<body>
    <div class="rbox">
        <ul>
            <li class="tp"></li>
            <li>彭士禄</li>
            <li>杨振宁</li>
            <li>顾诵芬</li>
            <li>吴天一</li>
            <li class="yj">朱彦夫</li>
        </ul>
    </div>
</body>
</html>
