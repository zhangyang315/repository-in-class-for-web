<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>一级标题</h1>
    <h2 align="center">二级标题居中对齐</h2>
    <h3 align="right">三级标题右对齐</h3>
    <h4 align="right">四级标题右对齐</h4>
    <h5 align="center">五级标题居中对齐</h5>
    <h6>六级标题</h6>

    <p>这是段落标签</p>
    <hr>水平线标签属性自己设置
    <p>这里写一段话，用换行<br>标签换行，用高亮标签高亮一些字</p>

    <p><strong>文本加粗显示</strong></p>
    <p><ins>文本以添加下划线的样式显示，强调语义</ins></p>
    <p><em>文本斜体显示，强调语义</em></p>
    <p><del>文本以添加删除线的样式显示，强调语义</del></p>
</body>
</html>
